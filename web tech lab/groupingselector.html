<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selectors Example</title>
    <style>
        h1, h2, p {
            color:rgb(7, 131, 147);
            text-align: center;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        .box {
            border: 2px solid black;
            padding: 10px;
            color: rgb(102, 39, 178);
        }
    </style>
</head>
<body>
    <h1>Grouping Selectors</h1>
    <h2>This is heading 2</h2>
    <p>It is used to apply same CSS styles to multiple elements at once.</p>
    <div class="box">It saves times, reduces code repetition, makes cleaner and shorter code and is easier to maintain.</div>
</body>
</html>
