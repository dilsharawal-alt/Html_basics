<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 ways of applying CSS</title>
    <style>
        h2 {
            color: rgb(196, 32, 11);
            font-family: 'Times New Roman', Times, serif ;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="color: rgb(18, 27, 113); font-style: italic;">Inline CSS is applied directly inside an HTML tag</h1>
    <h2>Internal CSS is written inside the style tag in the head section.</h2>
    <h3>External CSS is written in a separate file(.css) and linked to HTML.</h3>
</body>
</html>
