<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector Example</title>
    <style>
        #main-title {
            font-size: 40px;
            color: rgb(11, 124, 87);
            text-align: center;
        }
        #special-text {
            color: rgb(116, 7, 7);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 id="main-title">ID selector</h1>
    <p>This is a normal paragraph.</p>
    <p id="special-text">This is a special paragraph styled using id selector.</p>
</body>
</html>
