<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo class examples</title>
    <style>
        a:hover {
            color: red;
        }
        button:active {
            background-color: greenyellow;
        }
        input:focus {
            border: 2px solid blue;
        }
        p:first-child {
            color: purple;;
        }
        p:last-child {
            color: orange;
        }
        p:nth-child(2) {
            color:goldenrod;
        }
    </style>
</head>
<body>
    <a href="#">Hover over this link</a>
    <br><br>
    <button>CLick me</button>
    <br><br>
    <input type="text" placeholder="Click here">
    <br><br> 
    <div>
        <p>First paragraph</p>
        <p>Second paragraph</p>
        <p>Third paragraph</p>
    </div>
</body>
</html>
