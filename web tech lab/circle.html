<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Animation and Resizing</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .circle {
            width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 50%;
            animation: resize 2s infinite alternate;
        }

        @keyframes resize {
            from {
                    width: 100px;
                    height: 100px;
                }
            to {
                    width: 200px;
                    height: 200px;
                }
         }
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>
