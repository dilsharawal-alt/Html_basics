<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding VS Margin</title>
    <style>
        .padding-box {
            background-color: lightblue;
            border: 2px solid black;
            padding: 30px;
            margin: 10px;
        }
        .margin-box {
            background-color: aquamarine;
            border: 2px solid black;
            padding: 10px;
            margin: 40px;
        }
    </style>
</head>
<body>
    <div class="padding-box">This box has large padding (space inside).</div>
    <div class="margin-box">This box has large margin (space outside).</div>
</body>
</html>
