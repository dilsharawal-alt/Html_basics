<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Tiles</title>
    <style>
        body {
            font-family: Arial;
        }
        .container {
            width: 100%;
        }
        .box {
            width: 30%;
            height: 100px;
            background-color: lightblue;
            border: 4px solid black;
            margin: 10px;
            float: left;
            text-align: center;
            line-height: 100px;
        }
        .clearfix {
            clear: both;
        }
    </style>
</head>
<body>
    <h2>Floating Boxes Layout</h2>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
        <div class="clearfix"></div>
    </div>
</body>
</html>
