<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector Example</title>
    <style>
        .text-style {
            color: rgb(178, 27, 166);
            font-size: 25px;
        }
        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h2 class="text-style">This is a heading.</h2>
    <p class="text-style">This is paragraph one.</p>
    <p class="text-style highlight">This paragraph has two classes applied.</p>
</body>
</html>
