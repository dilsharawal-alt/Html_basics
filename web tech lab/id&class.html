<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID vs CLass Example</title>
    <style>
        #title {
            color: red;
            font-size: 24px;
        }
        .style {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1 id="title">This is a unique heading</h1>
    <p class="style">This is paragraph one.</p>
    <p class="style">This is paragraph two.</p>
    <p class="style">This is paragraph three.</p>
</body>
</html>
